name: Build Web Dashboard

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build -w web

      - name: Package
        run: |
          cd web/dist
          tar czf ../../dashboard.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dash-${{ github.run_id }}
          name: Hermes Dashboard ${{ github.run_id }}
          body: Prebuilt web dashboard dist for Android/Termux
          files: dashboard.tar.gz
          fail_on_unmatched_files: true
